name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/AI-Resume-Screening-System

            # 1. Clear any local file conflicts and sync with GitHub
            git fetch --all
            git reset --hard origin/main

            # 2. Activate environment and update packages
            source env/bin/activate
            pip install -r requirements.txt

            # 3. Aggressively free up port 8501 by killing whatever process holds it
            echo "Nuking old processes on port 8501..."
            sudo fuser -k 8501/tcp || true
            pkill -9 -f "streamlit" || true
            
            # 4. Small delay to let the operating system release the port completely
            sleep 2

            # 5. Launch the app on a single line with explicit IP routing configuration
            echo "Launching App Version 2..."
            nohup streamlit run webapp.py --browser.serverAddress 51.21.194.210 --server.address 0.0.0.0 --server.port 8501 > streamlit.log 2>&1 &
