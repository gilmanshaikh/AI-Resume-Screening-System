name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 (Fully Automatic)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            set -e

            echo "🚀 Deploying latest version..."

            cd /home/ubuntu/AI-Resume-Screening

            # HARD SYNC (always exact GitHub state)
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Update dependencies safely
            source env/bin/activate
            pip install -r requirements.txt

            # Restart ONLY via systemd (no manual processes)
            sudo systemctl daemon-reload
            sudo systemctl restart streamlit

            # Confirm service is alive
            sudo systemctl is-active streamlit

            echo "✅ Deployment successful"
