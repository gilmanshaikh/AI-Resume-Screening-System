name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Move into your actual server folder
            cd /home/ubuntu/AI-Resume-Screening

            # 2. Clean out any locks and pull your absolute newest GitHub changes
            git fetch --all
            git reset --hard origin/main

            # 3. Install any new dependencies you might have added locally
            source env/bin/activate
            pip install -r requirements.txt

            # 4. Kill the old background version instantly
            pkill -9 -f "streamlit run" || true
            
            # 5. Launch the brand new updated code cleanly in the background
            nohup env/bin/streamlit run webapp.py --server.port 8501 --server.address 0.0.0.0 --browser.serverAddress 51.21.194.210 > streamlit.log 2>&1 &
